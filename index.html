<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘의 거울</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Georgia', serif;
    }

    /*
      ============================================================
      방 배경: 아늑하고 알록달록한 Y2K 감성 침실
      첨부 이미지 참고 - 따뜻한 복숭아빛 벽, 디스코볼 빛, 창밖 도시
      ============================================================
    */
    body {
      background:
        /* 천장 쪽 디스코볼이 뿌리는 부드러운 빛 얼룩 */
        radial-gradient(circle at 50% 4%, rgba(255, 250, 240, 0.85), transparent 22%),
        /* 창문에서 들어오는 빛 (좌측 상단) */
        radial-gradient(ellipse at 14% 16%, rgba(255, 248, 230, 0.7), transparent 40%),
        /* 따뜻한 복숭아빛 번짐 (우측, 헤드보드 쪽) */
        radial-gradient(ellipse at 88% 38%, rgba(255, 198, 150, 0.45), transparent 55%),
        /* 방 벽 기본 톤 - 위는 크림, 아래로 갈수록 따뜻한 복숭아 */
        linear-gradient(165deg,
          #fdf3e7 0%,
          #fbe8d4 32%,
          #f6d8bf 60%,
          #efc9a8 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /*
      ============================================================
      배경 요소들 — 아늑한 Y2K 침실
      모든 요소는 pointer-events:none, 거울보다 낮은 z-index로
      거울이 항상 주인공이 되게 함
      ============================================================
    */

    /* 천장의 디스코볼 — 작은 거울 조각들이 빛나는 공 */
    .disco-ball {
      position: absolute;
      top: 2%;
      left: 50%;
      transform: translateX(-50%);
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background:
        /* 작은 사각 거울 타일 느낌의 격자 */
        repeating-linear-gradient(0deg, rgba(0,0,0,0.18) 0 7px, transparent 7px 14px),
        repeating-linear-gradient(90deg, rgba(0,0,0,0.18) 0 7px, transparent 7px 14px),
        radial-gradient(circle at 35% 30%, #ffffff 0%, #d8e4f0 35%, #9fb3c8 70%, #6d8299 100%);
      box-shadow:
        0 0 25px rgba(255, 255, 255, 0.7),
        0 0 50px rgba(220, 230, 245, 0.5);
      z-index: 2;
      pointer-events: none;
    }
    /* 디스코볼을 매단 줄 */
    .disco-ball::before {
      content: '';
      position: absolute;
      top: -28px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 28px;
      background: rgba(120, 110, 100, 0.5);
    }
    /* 디스코볼이 천천히 반짝이며 도는 느낌 */
    .disco-ball {
      animation: discoGlow 4s ease-in-out infinite;
    }
    @keyframes discoGlow {
      0%, 100% { filter: brightness(1); }
      50%      { filter: brightness(1.25); }
    }

    /* 천장에 흩뿌려진 디스코볼 빛 반점들 */
    .disco-dots {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 22%;
      pointer-events: none;
      z-index: 1;
      background:
        radial-gradient(circle at 18% 30%, rgba(255,240,210,0.8) 0 3px, transparent 4px),
        radial-gradient(circle at 30% 60%, rgba(255,240,210,0.7) 0 2px, transparent 3px),
        radial-gradient(circle at 44% 20%, rgba(255,240,210,0.8) 0 3px, transparent 4px),
        radial-gradient(circle at 62% 50%, rgba(255,240,210,0.7) 0 2px, transparent 3px),
        radial-gradient(circle at 74% 25%, rgba(255,240,210,0.8) 0 3px, transparent 4px),
        radial-gradient(circle at 86% 60%, rgba(255,240,210,0.7) 0 2px, transparent 3px),
        radial-gradient(circle at 22% 75%, rgba(255,240,210,0.6) 0 2px, transparent 3px),
        radial-gradient(circle at 56% 80%, rgba(255,240,210,0.6) 0 2px, transparent 3px);
    }

    /*
      창문 (좌측) — 창밖으로 도시 풍경이 보임
      거울에 가리지 않게 화면 왼쪽 가장자리에 배치
    */
    .window {
      position: absolute;
      top: 12%;
      left: 3%;
      width: 20%;
      height: 50%;
      background: linear-gradient(180deg, #bfe3f5 0%, #d8eef8 55%, #f0e0d0 100%);
      border: 7px solid #fbf3e7;
      border-radius: 4px;
      box-shadow:
        0 6px 20px rgba(120, 100, 80, 0.25),
        inset 0 0 25px rgba(255, 255, 255, 0.5);
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }
    /* 창밖 도시 빌딩 실루엣 */
    .window::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 55%;
      background:
        linear-gradient(90deg,
          #9db8c4 0% 14%, #b0c6d0 14% 22%,
          #8aa6b4 22% 38%, #a8bfc9 38% 50%,
          #93afbc 50% 68%, #b5cad3 68% 80%,
          #8aa6b4 80% 100%);
      /* 빌딩 윗변을 들쭉날쭉하게 */
      clip-path: polygon(0 35%, 14% 35%, 14% 12%, 22% 12%, 22% 30%,
        38% 30%, 38% 5%, 50% 5%, 50% 25%, 68% 25%, 68% 15%,
        80% 15%, 80% 40%, 100% 40%, 100% 100%, 0 100%);
    }
    /* 창틀 가로/세로 살 */
    .window::after {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      width: 5px; height: 100%;
      transform: translateX(-50%);
      background: #fbf3e7;
      box-shadow: 0 0 0 100px transparent;
    }

    /* 창문 위 걸린 화분 (행잉 플랜트) */
    .hanging-plant {
      position: absolute;
      top: 8%;
      left: 13%;
      width: 60px;
      height: 90px;
      z-index: 3;
      pointer-events: none;
    }
    /* 화분 */
    .hanging-plant .pot {
      position: absolute;
      top: 38px;
      left: 50%;
      transform: translateX(-50%);
      width: 34px;
      height: 26px;
      background: linear-gradient(180deg, #e89a6a 0%, #c9743f 100%);
      border-radius: 4px 4px 8px 8px;
    }
    /* 늘어진 덩굴잎 */
    .hanging-plant .vine {
      position: absolute;
      top: 55px;
      width: 8px;
      border-radius: 0 0 6px 6px;
      background: linear-gradient(180deg, #7ba84f, #5c8a3a);
    }
    .hanging-plant .vine.v1 { left: 32%; height: 34px; }
    .hanging-plant .vine.v2 { left: 50%; height: 26px; }
    .hanging-plant .vine.v3 { left: 64%; height: 30px; }

    /*
      벽의 곡선 헤드보드 — 거울 뒤쪽에 크게,
      이미지의 주황색 물결 모양 헤드보드를 단순화
    */
    .headboard {
      position: absolute;
      top: 16%;
      right: -4%;
      width: 58%;
      height: 60%;
      background: linear-gradient(160deg, #ff9d5c 0%, #f57e3a 60%, #e0692a 100%);
      /* 윗변을 부드러운 물결 곡선으로 */
      border-radius: 50% 50% 0 0 / 30% 30% 0 0;
      z-index: 1;
      pointer-events: none;
      box-shadow: 0 10px 40px rgba(200, 110, 50, 0.3);
    }

    /*
      갤러리 월 — 헤드보드 위에 걸린 작은 액자들
      여러 색의 작은 사각형으로 표현
    */
    .gallery {
      position: absolute;
      top: 20%;
      right: 6%;
      width: 40%;
      height: 32%;
      z-index: 2;
      pointer-events: none;
    }
    .frame {
      position: absolute;
      background: #fff;
      border: 4px solid #fff;
      box-shadow: 0 3px 8px rgba(120, 80, 50, 0.3);
    }
    /* 액자 안 그림 (색 면) */
    .frame::before {
      content: '';
      position: absolute;
      inset: 0;
    }
    .frame.f1 { top: 8%;  left: 6%;  width: 60px; height: 78px; transform: rotate(-3deg); }
    .frame.f1::before { background: linear-gradient(160deg, #ffd166, #f7a8b8); }
    .frame.f2 { top: 4%;  left: 38%; width: 70px; height: 56px; transform: rotate(2deg); }
    .frame.f2::before { background: linear-gradient(160deg, #a8d8c0, #6fb3a0); }
    .frame.f3 { top: 2%;  left: 74%; width: 52px; height: 64px; transform: rotate(-2deg); }
    .frame.f3::before { background: linear-gradient(160deg, #f4978e, #e85d75); }
    .frame.f4 { top: 52%; left: 12%; width: 56px; height: 50px; transform: rotate(3deg); }
    .frame.f4::before { background: linear-gradient(160deg, #b8b8f0, #8a8ad6); }
    .frame.f5 { top: 56%; left: 48%; width: 62px; height: 60px; transform: rotate(-4deg); }
    .frame.f5::before { background: linear-gradient(160deg, #ffe0a3, #ffb86c); }
    .frame.f6 { top: 50%; left: 80%; width: 46px; height: 54px; transform: rotate(2deg); }
    .frame.f6::before { background: linear-gradient(160deg, #c3e8a8, #8fc96f); }

    /* 바닥의 푹신한 빨간 러그 */
    .rug {
      position: absolute;
      bottom: -8%;
      left: 50%;
      transform: translateX(-50%);
      width: 95%;
      height: 32%;
      background: radial-gradient(ellipse at 50% 35%,
        #e0506a 0%, #c8395a 55%, #a82a48 100%);
      border-radius: 50%;
      z-index: 1;
      pointer-events: none;
      filter: blur(1px);
    }

    /* 바닥 쪽 부드러운 그림자 (방에 깊이감) */
    .floor-shadow {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 22%;
      background: linear-gradient(180deg, transparent, rgba(150, 90, 70, 0.25));
      pointer-events: none;
      z-index: 1;
    }

    /*
      ============================================================
      거울 (부드러운 스타일 유지)
      ============================================================
    */
    .mirror-container {
      position: relative;
      width: 500px;
      height: 680px;
      perspective: 1500px;
      z-index: 20;
    }

    .mirror-rotator {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
    }

    .mirror-rotator.flip-up   { animation: flipUp   1.4s ease-in-out; }
    .mirror-rotator.flip-down { animation: flipDown 1.4s ease-in-out; }

    @keyframes flipUp {
      0%   { transform: rotateX(0deg); }
      100% { transform: rotateX(360deg); }
    }
    @keyframes flipDown {
      0%   { transform: rotateX(0deg); }
      100% { transform: rotateX(-360deg); }
    }

    .mirror-frame {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #ece0c8 0%, #d8c4a4 50%, #c8b288 100%);
      border-radius: 10px;
      padding: 60px 60px;
      box-shadow:
        0 25px 80px rgba(0, 0, 0, 0.45),
        inset 0 2px 6px rgba(255, 255, 255, 0.35),
        inset 0 -2px 6px rgba(0, 0, 0, 0.2);
    }

    .mirror-screen {
      position: relative;
      width: 100%;
      height: 100%;
      background: #1a0e08;
      border-radius: 5px;
      overflow: hidden;
      box-shadow: inset 0 0 35px rgba(0, 0, 0, 0.8);
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    .camera-message {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #d4b896;
      text-align: center;
      font-size: 14px;
      line-height: 1.6;
      padding: 20px;
    }

    /* 오버레이 */
    .overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      transition: opacity 0.8s ease;
      pointer-events: none;
    }
    .overlay.hidden { opacity: 0; pointer-events: none; }

    /* 질문: 거울 맨 상단, 가로 가운데 */
    .question {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      text-align: center;
      color: #fff5e6;
      font-size: 26px;
      text-shadow:
        0 2px 8px rgba(0, 0, 0, 0.8),
        0 0 24px rgba(255, 180, 120, 0.4);
      letter-spacing: 1px;
      font-family: 'Georgia', serif;
    }

    /*
      ============================================================
      타이머: 거울 맨 상단 가운데. 질문이 사라진 뒤 나타남
      첨부 이미지의 디지털 시계 느낌 - 단, 색상은 흰색
      ============================================================
    */
    .timer {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      /* 처음엔 숨김 - JS가 .visible을 붙이면 나타남 */
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
      z-index: 11;

      /* 디지털 시계 글꼴 - 등폭(monospace)이라 숫자가 떨려 보이지 않음 */
      font-family: 'Courier New', Consolas, monospace;
      font-weight: bold;
      font-size: 46px;
      letter-spacing: 4px;
      color: #ffffff;
      /* 흰색 LED가 빛나는 듯한 글로우 */
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.9),
        0 0 18px rgba(255, 255, 255, 0.6),
        0 0 30px rgba(255, 255, 255, 0.4),
        0 2px 4px rgba(0, 0, 0, 0.6);
    }

    .timer.visible {
      opacity: 1;
    }

    /* 0:00 도달 시 깜빡이는 효과 */
    .timer.done {
      animation: timerBlink 0.6s ease-in-out infinite;
    }
    @keyframes timerBlink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    /* 버튼: 좌우 하단 모서리, 가로 정렬 */
    .buttons {
      position: absolute;
      bottom: 24px;
      left: 24px;
      right: 24px;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
    }

    .btn {
      padding: 14px 32px;
      font-size: 17px;
      font-family: 'Georgia', serif;
      background: rgba(255, 245, 230, 0.15);
      color: #fff5e6;
      border: 1.5px solid rgba(255, 245, 230, 0.6);
      border-radius: 30px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
      pointer-events: auto;
    }
    .btn:hover {
      background: rgba(255, 245, 230, 0.3);
      transform: scale(1.05);
    }

    /*
      ============================================================
      전구: 입체적인 구(球) 형태
      인플루언서 메이크업 거울처럼 - 진짜 전구가 박혀있는 느낌
      여러 레이어로 입체감을 만듦:
      - 베이스: 어두운 가장자리 → 밝은 중심 그라데이션
      - ::before: 위쪽 밝은 하이라이트 (빛 반사)
      - box-shadow: 바깥쪽 글로우 + 안쪽 음영
      ============================================================
    */
    .bulb {
      position: absolute;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      /*
        구체 느낌의 다층 그라데이션:
        밝은 점(왼쪽 위) → 중간톤 → 가장자리 어두움
      */
      background:
        radial-gradient(circle at 32% 30%,
          #ffffff 0%,
          #fff5d8 18%,
          #ffe9a8 42%,
          #f5c860 68%,
          #d4a040 88%,
          #b88828 100%);
      box-shadow:
        /* 바깥 글로우 (전구가 빛을 뿜는 느낌) */
        0 0 18px rgba(255, 225, 150, 0.85),
        0 0 38px rgba(255, 205, 120, 0.55),
        0 0 60px rgba(255, 185, 100, 0.35),
        /* 전구 아래쪽 그림자 (프레임에 박힌 입체감) */
        0 4px 8px rgba(120, 80, 30, 0.5),
        /* 안쪽 음영 (구체의 둥근 느낌) */
        inset -3px -4px 8px rgba(150, 100, 40, 0.55),
        inset 2px 2px 6px rgba(255, 255, 255, 0.6);
      z-index: 5;
      transition: background 1.2s ease, box-shadow 1.2s ease;
    }

    /*
      전구 위의 하이라이트 (작고 밝은 빛 반사점)
      이게 있으면 "유리/플라스틱 구체"라는 인상이 확 살아남
    */
    .bulb::before {
      content: '';
      position: absolute;
      top: 16%;
      left: 22%;
      width: 32%;
      height: 26%;
      border-radius: 50%;
      background: radial-gradient(ellipse at center,
        rgba(255, 255, 255, 0.95) 0%,
        rgba(255, 255, 255, 0.4) 55%,
        transparent 100%);
      pointer-events: none;
    }

    .bulb.top-1 { top: 9px; left: 60px; }
    .bulb.top-2 { top: 9px; left: 50%; transform: translateX(-50%); }
    .bulb.top-3 { top: 9px; right: 60px; }

    .bulb.left-1  { top: 150px; left: 9px; }
    .bulb.left-2  { top: 290px; left: 9px; }
    .bulb.left-3  { top: 430px; left: 9px; }
    .bulb.left-4  { top: 570px; left: 9px; }

    .bulb.right-1 { top: 150px; right: 9px; }
    .bulb.right-2 { top: 290px; right: 9px; }
    .bulb.right-3 { top: 430px; right: 9px; }
    .bulb.knob    { top: 570px; right: 9px; cursor: grab; }
    .bulb.knob:active { cursor: grabbing; }

    /* 노브 위 작은 표식 (회전 손잡이 느낌) */
    .knob::after {
      content: '';
      position: absolute;
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
      width: 5px;
      height: 11px;
      background: rgba(120, 70, 30, 0.8);
      border-radius: 2px;
      z-index: 1;
    }

    /*
      ============================================================
      전구 색상 - 노브를 돌리면 무지개 색으로 변함
      JS가 .mirror-container에 CSS 변수(--glow-color 등)를 설정하면
      전구와 프레임이 그 색을 따라감
      CSS 변수 방식 → 7색이든 100색이든 CSS 추가 없이 처리 가능
      ============================================================
    */
    .mirror-container.lit .bulb {
      background:
        radial-gradient(circle at 32% 30%,
          var(--bulb-c0) 0%,
          var(--bulb-c1) 22%,
          var(--bulb-c2) 55%,
          var(--bulb-c3) 80%,
          var(--bulb-c4) 100%);
      box-shadow:
        0 0 22px var(--glow-strong),
        0 0 45px var(--glow-mid),
        0 0 70px var(--glow-soft),
        0 4px 8px rgba(80, 50, 20, 0.5),
        inset -3px -4px 8px var(--bulb-shade),
        inset 2px 2px 6px rgba(255, 255, 255, 0.55);
      animation: bulbGlow 3s ease-in-out infinite;
    }

    /* 거울 사각형 프레임도 같은 색 계열로 */
    .mirror-container.lit .mirror-frame {
      background: linear-gradient(135deg,
        var(--bulb-c1) 0%,
        var(--bulb-c2) 50%,
        var(--bulb-c3) 100%);
      box-shadow:
        0 25px 80px rgba(0, 0, 0, 0.45),
        0 0 40px var(--glow-mid),
        inset 0 2px 6px rgba(255, 255, 255, 0.35),
        inset 0 -2px 6px rgba(0, 0, 0, 0.2);
    }

    /* 색이 바뀔 때 부드럽게 전환 */
    .bulb, .mirror-frame {
      transition: background 0.6s ease, box-shadow 0.6s ease;
    }

    /*
      "은은하게 빛나는" 효과 - 전구가 천천히 밝아졌다 어두워짐
    */
    @keyframes bulbGlow {
      0%, 100% { filter: brightness(1); }
      50%      { filter: brightness(1.18); }
    }

    .knob-hint {
      position: absolute;
      /* 오른쪽 맨 아래 노브(top:570 + 높이46) 아래에 배치 */
      top: 624px;
      /*
        노브 중심은 오른쪽에서 9+23=32px 지점.
        hint 박스를 80px로 넓히고 중심(40px)을 노브 중심에 맞춤
        → right = 32 - 40 = -8px
        넉넉한 폭 덕에 '돌려보세요'가 한 줄에 들어감
      */
      width: 80px;
      right: -8px;
      text-align: center;
      color: rgba(255, 245, 230, 0.9);
      font-size: 11px;
      font-style: italic;
      line-height: 1.3;
      white-space: nowrap;
      pointer-events: none;
      transition: opacity 0.5s ease;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
      z-index: 21;
    }
    .knob-hint.hidden { opacity: 0; }
  </style>
</head>
<body>

  <!-- 방의 빛/그림자 레이어 -->
  <!-- ============ 아늑한 Y2K 침실 배경 ============ -->

  <!-- 천장: 디스코볼 + 빛 반점 -->
  <div class="disco-dots"></div>
  <div class="disco-ball"></div>

  <!-- 벽: 곡선 헤드보드 + 갤러리 월 -->
  <div class="headboard"></div>
  <div class="gallery">
    <div class="frame f1"></div>
    <div class="frame f2"></div>
    <div class="frame f3"></div>
    <div class="frame f4"></div>
    <div class="frame f5"></div>
    <div class="frame f6"></div>
  </div>

  <!-- 창문 + 창밖 도시 + 행잉 플랜트 -->
  <div class="window"></div>
  <div class="hanging-plant">
    <div class="vine v1"></div>
    <div class="vine v2"></div>
    <div class="vine v3"></div>
    <div class="pot"></div>
  </div>

  <!-- 바닥: 빨간 러그 + 그림자 -->
  <div class="rug"></div>
  <div class="floor-shadow"></div>

  <!-- 거울 -->
  <div class="mirror-container" id="mirrorContainer">
    <div class="mirror-rotator" id="mirrorRotator">

      <div class="mirror-frame">
        <div class="mirror-screen">
          <video id="video" autoplay playsinline muted></video>
          <div class="camera-message" id="cameraMessage">
            거울을 켜려면 카메라 권한을 허용해주세요
          </div>
          <div class="overlay" id="overlay">
            <div class="question">지금 기분이 어때요?</div>
            <div class="buttons">
              <button class="btn" id="btnGood">괜찮아</button>
              <button class="btn" id="btnBad">별로야</button>
            </div>
          </div>
          <!-- 타이머: 질문이 사라진 뒤 나타남 -->
          <div class="timer" id="timer">20:00</div>
        </div>
      </div>

      <div class="bulb top-1"></div>
      <div class="bulb top-2"></div>
      <div class="bulb top-3"></div>

      <div class="bulb left-1"></div>
      <div class="bulb left-2"></div>
      <div class="bulb left-3"></div>
      <div class="bulb left-4"></div>

      <div class="bulb right-1"></div>
      <div class="bulb right-2"></div>
      <div class="bulb right-3"></div>
      <div class="bulb knob" id="knob"></div>

    </div>

    <div class="knob-hint" id="knobHint">↑<br>돌려보세요</div>
  </div>

  <script>
    // 카메라
    const video = document.getElementById('video');
    const cameraMessage = document.getElementById('cameraMessage');

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user' }, audio: false
        });
        video.srcObject = stream;
        cameraMessage.style.display = 'none';
      } catch (err) {
        cameraMessage.textContent = '카메라를 사용할 수 없어요.\n권한을 확인하거나 다시 시도해주세요.';
        console.error('카메라 에러:', err);
      }
    }
    startCamera();

    // 거울 회전
    const mirrorRotator = document.getElementById('mirrorRotator');
    const overlay = document.getElementById('overlay');
    const btnGood = document.getElementById('btnGood');
    const btnBad = document.getElementById('btnBad');
    const timer = document.getElementById('timer');

    let isFlipping = false;
    let timerStarted = false;  // 타이머가 이미 시작됐는지 (중복 방지)

    function flipMirror(direction) {
      if (isFlipping) return;
      isFlipping = true;

      const className = direction === 'up' ? 'flip-up' : 'flip-down';
      mirrorRotator.classList.add(className);

      setTimeout(() => {
        mirrorRotator.classList.remove(className);
        isFlipping = false;
        // (타이머는 노브를 처음 돌릴 때 시작됨 - setStage 참고)
      }, 1400);
    }

    btnGood.addEventListener('click', () => { flipMirror('up'); overlay.classList.add('hidden'); });
    btnBad.addEventListener('click',  () => { flipMirror('down'); overlay.classList.add('hidden'); });

    // ============================================================
    // 20분 타이머: 20:00부터 0:00까지 카운트다운
    // 0:00 도달 시 깜빡임 + 알림음
    // ============================================================
    function startTimer() {
      if (timerStarted) return;  // 한 번만 시작
      timerStarted = true;

      let totalSeconds = 20 * 60;  // 20분 = 1200초

      // 초를 MM:SS 형식 문자열로 변환
      function format(sec) {
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        // 분/초 모두 2자리로 (예: 09:05). padStart가 앞자리를 0으로 채움
        return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
      }

      // 첫 화면: 20:00 표시 + 나타나기
      timer.textContent = format(totalSeconds);
      timer.classList.add('visible');

      // 1초마다 1씩 감소
      const interval = setInterval(() => {
        totalSeconds--;
        timer.textContent = format(totalSeconds);

        if (totalSeconds <= 0) {
          clearInterval(interval);       // 카운트다운 정지
          timer.classList.add('done');   // 깜빡임 효과
          playAlarm();                   // 알림음
        }
      }, 1000);
    }

    // 알림음: Web Audio로 만든 부드러운 '띵-띵-띵' 3회
    function playAlarm() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const beepFreq = 880;  // 솔#5 정도의 맑은 음

      // 한 번의 비프음
      function beep(startTime) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = beepFreq;

        gain.gain.setValueAtTime(0, startTime);
        gain.gain.linearRampToValueAtTime(0.3, startTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.5);

        osc.connect(gain).connect(audioCtx.destination);
        osc.start(startTime);
        osc.stop(startTime + 0.5);
      }

      // 0.6초 간격으로 3번
      const now = audioCtx.currentTime;
      beep(now);
      beep(now + 0.6);
      beep(now + 1.2);
    }

    // 노브 + 오르골
    const mirrorContainer = document.getElementById('mirrorContainer');
    const knob = document.getElementById('knob');
    const knobHint = document.getElementById('knobHint');

    let rotation = 0, isDragging = false, lastAngle = 0;
    let totalRotation = 0, currentStage = -1, audioStarted = false;

    function getKnobCenter() {
      const r = knob.getBoundingClientRect();
      return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
    }
    function getAngle(mx, my) {
      const c = getKnobCenter();
      return Math.atan2(my - c.y, mx - c.x) * (180 / Math.PI);
    }
    function handleDragStart(x, y, e) {
      isDragging = true;
      lastAngle = getAngle(x, y);
      e.preventDefault();
    }
    function handleDragMove(x, y) {
      if (!isDragging) return;
      const cur = getAngle(x, y);
      let delta = cur - lastAngle;
      if (delta > 180) delta -= 360;
      if (delta < -180) delta += 360;
      // 시계방향(양수 delta)으로 돌릴 때만 반응
      if (delta > 0) {
        rotation += delta;
        totalRotation += delta;
        knob.style.transform = `rotate(${rotation}deg)`;

        /*
          무지개 색상 체계:
          노브를 조금씩 돌릴 때마다 무지개 7색이 순서대로 나타남
          (빨 → 주 → 노 → 초 → 파 → 남 → 보)
          누적 회전 60도마다 다음 색으로 넘어감.
          7색을 다 지나면 다시 빨강으로 (순환)
        */
        const step = Math.floor(totalRotation / 60);   // 60도당 1단계
        const colorIndex = step % RAINBOW.length;       // 7색 순환
        if (colorIndex !== currentStage) setStage(colorIndex);
      }
      lastAngle = cur;
    }
    function handleDragEnd() { isDragging = false; }

    knob.addEventListener('mousedown', (e) => handleDragStart(e.clientX, e.clientY, e));
    window.addEventListener('mousemove', (e) => handleDragMove(e.clientX, e.clientY));
    window.addEventListener('mouseup', handleDragEnd);

    knob.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      handleDragStart(t.clientX, t.clientY, e);
    });
    window.addEventListener('touchmove', (e) => {
      const t = e.touches[0];
      handleDragMove(t.clientX, t.clientY);
    });
    window.addEventListener('touchend', handleDragEnd);

    /*
      무지개 7색 팔레트.
      각 색마다 전구 그라데이션용 5단계 색 + 그림자색을 정의.
      c0(가장 밝은 중심) → c4(가장 어두운 가장자리) 순.
    */
    const RAINBOW = [
      { name:'빨강', c0:'#ffe3e3', c1:'#ff9d9d', c2:'#ff4d4d', c3:'#d62828', c4:'#a01a1a', shade:'rgba(140,30,30,0.55)', glow:'255,77,77' },
      { name:'주황', c0:'#fff0db', c1:'#ffce8a', c2:'#ff9a3c', c3:'#e67514', c4:'#b85710', shade:'rgba(150,80,20,0.55)', glow:'255,154,60' },
      { name:'노랑', c0:'#fffce0', c1:'#fff09a', c2:'#ffe23d', c3:'#e6c416', c4:'#b89a10', shade:'rgba(150,130,20,0.55)', glow:'255,226,61' },
      { name:'초록', c0:'#e3ffe8', c1:'#9dffae', c2:'#4dd866', c3:'#28a043', c4:'#1a7030', shade:'rgba(30,120,50,0.55)', glow:'77,216,102' },
      { name:'파랑', c0:'#e3f3ff', c1:'#9dd2ff', c2:'#4da6ff', c3:'#2878d6', c4:'#1a55a0', shade:'rgba(30,80,140,0.55)', glow:'77,166,255' },
      { name:'남색', c0:'#e6e6ff', c1:'#a8a8ff', c2:'#5d5dd6', c3:'#3838a0', c4:'#262670', shade:'rgba(40,40,110,0.55)', glow:'93,93,214' },
      { name:'보라', c0:'#f5e3ff', c1:'#d89dff', c2:'#b04dff', c3:'#8028d6', c4:'#5e1aa0', shade:'rgba(90,30,140,0.55)', glow:'176,77,255' },
    ];

    function setStage(colorIndex) {
      const c = RAINBOW[colorIndex];
      currentStage = colorIndex;

      // CSS 변수로 전구/프레임 색을 한 번에 갱신
      const s = mirrorContainer.style;
      s.setProperty('--bulb-c0', c.c0);
      s.setProperty('--bulb-c1', c.c1);
      s.setProperty('--bulb-c2', c.c2);
      s.setProperty('--bulb-c3', c.c3);
      s.setProperty('--bulb-c4', c.c4);
      s.setProperty('--bulb-shade', c.shade);
      s.setProperty('--glow-strong', `rgba(${c.glow}, 0.9)`);
      s.setProperty('--glow-mid',    `rgba(${c.glow}, 0.6)`);
      s.setProperty('--glow-soft',   `rgba(${c.glow}, 0.4)`);

      // 'lit' 클래스가 붙어야 색상 CSS가 적용됨 (최초 1회)
      mirrorContainer.classList.add('lit');
      knobHint.classList.add('hidden');
      if (!audioStarted) { startMusicBox(); audioStarted = true; }
      // 노브를 처음 돌리는 순간 20분 타이머 시작 (startTimer 내부에서 중복 방지)
      startTimer();
    }

    /*
      ============================================================
      잔잔한 클래식 배경음악
      에릭 사티 '짐노페디 1번'(1888, 저작권 만료된 퍼블릭 도메인)의
      멜로디를 차용해 부드러운 피아노 톤으로 합성.
      느리고 잔잔한 3박자 곡이라 거울 앞 차분한 시간에 잘 어울림.
      한 바퀴(약 80초)를 계속 반복 → 20분 내내 끊김 없이 흐름.
      ============================================================
    */
    function startMusicBox() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      // 부드러운 잔향(reverb 비슷한 효과)을 위한 마스터 게인
      const master = audioCtx.createGain();
      master.gain.value = 0.0;
      // 곡 시작 시 5초에 걸쳐 천천히 페이드인 (갑자기 안 튀게)
      master.gain.setValueAtTime(0.0, audioCtx.currentTime);
      master.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 5);
      master.connect(audioCtx.destination);

      // 음 이름 → 주파수(Hz)
      const N = {
        A2:110.00, D3:146.83, E3:164.81, G3:196.00, A3:220.00,
        B3:246.94, C4:261.63, D4:293.66, E4:329.63, Fs4:369.99,
        G4:392.00, A4:440.00, B4:493.88, C5:523.25, Cs5:554.37,
        D5:587.33, E5:659.25, Fs5:739.99, G5:783.99, A5:880.00,
      };

      /*
        곡 데이터: 짐노페디 1번 도입부 멜로디 + 베이스
        beat = 한 박자 길이(초). 느린 3박자.
        bass: 왼손 (낮은 음, 길게)
        melody: 오른손 (높은 음, 노래하듯)
        값이 0이면 쉼표.
      */
      const beat = 1.1;

      // 왼손 베이스 패턴 (3박자: 낮은음 - 화음 - 화음)
      const bassLine = [
        N.G3, N.A2, N.D3,
        N.G3, N.A2, N.D3,
        N.E3, N.A2, N.E3,
        N.E3, N.A2, N.E3,
      ];

      // 오른손 멜로디 (짐노페디 1번 주제 선율 근사)
      const melodyLine = [
        0,      N.Fs5, N.A5,
        N.G5,   N.Fs5, N.D5,
        0,      N.A4,  N.D5,
        N.Cs5,  N.B4,  N.A4,
        0,      N.Fs5, N.A5,
        N.G5,   N.Fs5, N.D5,
        0,      N.E5,  N.G5,
        N.Fs5, N.E5,  N.D5,
      ];

      // 한 음을 부드러운 피아노 톤으로 재생
      function playNote(freq, startTime, duration, peak) {
        if (!freq) return;  // 쉼표
        // 기본음 (사인파 - 부드러움) + 약한 배음(삼각파 - 약간의 울림)
        const osc1 = audioCtx.createOscillator();
        osc1.type = 'sine';
        osc1.frequency.value = freq;
        const osc2 = audioCtx.createOscillator();
        osc2.type = 'triangle';
        osc2.frequency.value = freq * 2;

        const g = audioCtx.createGain();
        // 피아노 같은 엔벨로프: 빠른 어택, 느린 감쇠
        g.gain.setValueAtTime(0, startTime);
        g.gain.linearRampToValueAtTime(peak, startTime + 0.04);
        g.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

        const g2 = audioCtx.createGain();
        g2.gain.setValueAtTime(0, startTime);
        g2.gain.linearRampToValueAtTime(peak * 0.25, startTime + 0.04);
        g2.gain.exponentialRampToValueAtTime(0.0001, startTime + duration * 0.7);

        osc1.connect(g).connect(master);
        osc2.connect(g2).connect(master);
        osc1.start(startTime); osc1.stop(startTime + duration + 0.1);
        osc2.start(startTime); osc2.stop(startTime + duration + 0.1);
      }

      /*
        곡 한 바퀴를 재생.
        멜로디는 베이스보다 한 박자 쉬었다 들어와 여운을 줌.
      */
      function playPhrase(startTime) {
        let t = startTime;
        for (let i = 0; i < bassLine.length; i++) {
          // 베이스: 길게 울림, 작은 음량
          playNote(bassLine[i], t, beat * 2.6, 0.16);
          // 멜로디: 베이스 위에 노래하듯, 더 또렷하게
          if (melodyLine[i]) {
            playNote(melodyLine[i], t + 0.15, beat * 2.2, 0.22);
          }
          t += beat;
        }
        return t - startTime;  // 이 악구의 총 길이(초)
      }

      // 곡을 끊김 없이 계속 이어 재생 (20분이고 그 이상이고 무한 반복)
      function loop(startTime) {
        const phraseLen = playPhrase(startTime);
        // 다음 악구를 살짝 미리 예약 (끊김 방지)
        const nextTime = startTime + phraseLen;
        const msUntilNext = (nextTime - audioCtx.currentTime - 0.5) * 1000;
        setTimeout(() => loop(nextTime), Math.max(0, msUntilNext));
      }

      loop(audioCtx.currentTime + 0.1);
    }
  </script>
</body>
</html>
