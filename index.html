<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘의 거울</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Georgia', serif;
    }

    /*
      ============================================================
      방 배경: 화사한 햇빛이 들어오는 아이보리 톤의 방
      첨부 이미지 참고 - 부드럽고 따뜻한 화이트/베이지 색감
      ============================================================
    */
    body {
      background:
        /* 창문에서 들어오는 햇빛 글로우 (좌측 상단) */
        radial-gradient(ellipse at 20% 12%, rgba(255, 252, 240, 0.95), transparent 45%),
        /* 부드러운 따뜻한 빛 번짐 (우측) */
        radial-gradient(ellipse at 85% 40%, rgba(255, 245, 230, 0.6), transparent 50%),
        /* 방 벽의 기본 톤 - 위는 밝고 아래로 갈수록 약간 그늘 */
        linear-gradient(165deg,
          #fbf6ee 0%,
          #f5ece0 35%,
          #efe3d4 65%,
          #e6d8c6 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /*
      벽에 비치는 부드러운 햇빛 무늬 (창살 그림자 같은 느낌)
      아주 옅게 깔아서 "빛이 들어오는 방" 분위기를 강화
    */
    .sun-patch {
      position: absolute;
      top: -5%;
      left: 8%;
      width: 45%;
      height: 80%;
      background: linear-gradient(115deg,
        rgba(255, 255, 250, 0.7) 0%,
        rgba(255, 255, 250, 0.25) 35%,
        transparent 60%);
      transform: rotate(-8deg);
      filter: blur(20px);
      pointer-events: none;
      z-index: 1;
    }

    /* 바닥 쪽 따뜻한 그림자 (방에 깊이감) */
    .floor-shadow {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 25%;
      background: linear-gradient(180deg, transparent, rgba(180, 150, 120, 0.25));
      pointer-events: none;
      z-index: 1;
    }

    /*
      ============================================================
      커튼: 거울 뒤 좌우에서 살랑이는 투명한 아이보리 시폰
      거울을 가리지 않도록 화면 가장자리 쪽에 배치
      ============================================================
    */
    .curtain {
      position: absolute;
      top: -2%;
      height: 104%;
      width: 26%;
      z-index: 2;
      pointer-events: none;
      /* transform-origin을 위쪽으로 - 커튼이 천장에 매달린 것처럼 흔들림 */
      transform-origin: top center;
    }

    .curtain.left  { left: -3%; }
    .curtain.right { right: -3%; }

    /*
      커튼 천: 세로 주름을 반복 그라데이션으로 표현
      투명도를 높게 줘서 "비치는 시폰" 느낌
    */
    .curtain-fabric {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background:
        repeating-linear-gradient(90deg,
          rgba(255, 250, 240, 0.0) 0px,
          rgba(255, 250, 240, 0.55) 18px,
          rgba(248, 240, 226, 0.75) 36px,
          rgba(255, 250, 240, 0.55) 54px,
          rgba(255, 250, 240, 0.0) 72px);
      /* 위에서 아래로 살짝 투명해지며 빛 통과 */
      mask-image: linear-gradient(180deg, #000 0%, #000 70%, transparent 100%);
      -webkit-mask-image: linear-gradient(180deg, #000 0%, #000 70%, transparent 100%);
    }

    /* 커튼 살랑임 - 좌우가 서로 다른 타이밍/방향으로 */
    .curtain.left .curtain-fabric {
      animation: breezeLeft 7s ease-in-out infinite;
      transform-origin: top center;
    }
    .curtain.right .curtain-fabric {
      animation: breezeRight 8s ease-in-out infinite;
      transform-origin: top center;
    }

    /*
      breeze 애니메이션: skew(기울임) + scaleX(폭 변화)로
      천이 바람에 부풀었다 가라앉는 느낌
    */
    @keyframes breezeLeft {
      0%, 100% { transform: skewX(0deg) scaleX(1); }
      35%      { transform: skewX(3deg) scaleX(1.04); }
      65%      { transform: skewX(-1.5deg) scaleX(0.98); }
    }
    @keyframes breezeRight {
      0%, 100% { transform: skewX(0deg) scaleX(1); }
      35%      { transform: skewX(-3deg) scaleX(1.04); }
      65%      { transform: skewX(1.5deg) scaleX(0.98); }
    }

    /* 커튼 봉 (천장 쪽 가로 막대) */
    .curtain-rod {
      position: absolute;
      top: 2%;
      left: -5%;
      right: -5%;
      height: 10px;
      /* Pantone 284C (≈ #6CACE4) - 부드러운 하늘색 */
      background: linear-gradient(180deg, #8FC3EC 0%, #6CACE4 100%);
      border-radius: 5px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
      z-index: 3;
      pointer-events: none;
    }

    /*
      ============================================================
      폴라로이드 사진: 거울 양옆에 몇 장, 적절한 간격으로
      살짝 기울여서 사물함에 붙인 느낌
      ============================================================
    */
    .polaroid {
      position: absolute;
      width: 130px;
      background: #fffdf8;
      padding: 10px 10px 32px 10px;  /* 아래쪽 여백이 큰 게 폴라로이드 특징 */
      box-shadow:
        0 6px 18px rgba(120, 100, 80, 0.28),
        0 1px 3px rgba(0, 0, 0, 0.15);
      z-index: 8;
      transition: transform 0.3s ease;
    }

    /* 사진 안쪽 (실제 이미지 영역) - 그라데이션으로 추억 느낌 */
    .polaroid-photo {
      width: 100%;
      height: 110px;
      border-radius: 1px;
      /* 배경 이미지가 칸에 꽉 차게, 비율 유지하며 잘림 */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      /* 사진에 살짝 빈티지한 따뜻함 */
      filter: saturate(0.95) brightness(1.02);
    }

    /* 폴라로이드 하단 손글씨 캡션 */
    .polaroid-caption {
      margin-top: 8px;
      text-align: center;
      font-family: 'Bradley Hand', 'Segoe Script', cursive;
      font-size: 13px;
      color: #8a7866;
    }

    /* 사진을 붙인 마스킹 테이프 (위쪽에 반투명 조각) */
    .polaroid::before {
      content: '';
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%) rotate(-4deg);
      width: 46px;
      height: 22px;
      background: rgba(230, 220, 195, 0.65);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
    }

    /* 개별 폴라로이드 위치 + 기울기 (거울 양옆, 적당한 간격) */
    .polaroid.p1 {
      top: 14%; left: 5%;
      transform: rotate(-7deg);
    }
    .polaroid.p2 {
      top: 52%; left: 7%;
      transform: rotate(5deg);
    }
    .polaroid.p3 {
      top: 16%; right: 5%;
      transform: rotate(6deg);
    }
    .polaroid.p4 {
      top: 54%; right: 6%;
      transform: rotate(-5deg);
    }

    /* 마우스 올리면 살짝 똑바로 + 커짐 (사진 들여다보는 느낌) */
    .polaroid:hover {
      transform: rotate(0deg) scale(1.06);
      z-index: 9;
    }

    /*
      ============================================================
      거울 (부드러운 스타일 유지)
      ============================================================
    */
    .mirror-container {
      position: relative;
      width: 500px;
      height: 680px;
      perspective: 1500px;
      z-index: 20;
    }

    .mirror-rotator {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
    }

    .mirror-rotator.flip-up   { animation: flipUp   1.4s ease-in-out; }
    .mirror-rotator.flip-down { animation: flipDown 1.4s ease-in-out; }

    @keyframes flipUp {
      0%   { transform: rotateX(0deg); }
      100% { transform: rotateX(360deg); }
    }
    @keyframes flipDown {
      0%   { transform: rotateX(0deg); }
      100% { transform: rotateX(-360deg); }
    }

    .mirror-frame {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #ece0c8 0%, #d8c4a4 50%, #c8b288 100%);
      border-radius: 10px;
      padding: 60px 60px;
      box-shadow:
        0 25px 80px rgba(0, 0, 0, 0.45),
        inset 0 2px 6px rgba(255, 255, 255, 0.35),
        inset 0 -2px 6px rgba(0, 0, 0, 0.2);
    }

    .mirror-screen {
      position: relative;
      width: 100%;
      height: 100%;
      background: #1a0e08;
      border-radius: 5px;
      overflow: hidden;
      box-shadow: inset 0 0 35px rgba(0, 0, 0, 0.8);
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    .camera-message {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #d4b896;
      text-align: center;
      font-size: 14px;
      line-height: 1.6;
      padding: 20px;
    }

    /* 오버레이 */
    .overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      transition: opacity 0.8s ease;
      pointer-events: none;
    }
    .overlay.hidden { opacity: 0; pointer-events: none; }

    /* 질문: 거울 맨 상단, 가로 가운데 */
    .question {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      text-align: center;
      color: #fff5e6;
      font-size: 26px;
      text-shadow:
        0 2px 8px rgba(0, 0, 0, 0.8),
        0 0 24px rgba(255, 180, 120, 0.4);
      letter-spacing: 1px;
      font-family: 'Georgia', serif;
    }

    /*
      ============================================================
      타이머: 거울 맨 상단 가운데. 질문이 사라진 뒤 나타남
      첨부 이미지의 디지털 시계 느낌 - 단, 색상은 흰색
      ============================================================
    */
    .timer {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      /* 처음엔 숨김 - JS가 .visible을 붙이면 나타남 */
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
      z-index: 11;

      /* 디지털 시계 글꼴 - 등폭(monospace)이라 숫자가 떨려 보이지 않음 */
      font-family: 'Courier New', Consolas, monospace;
      font-weight: bold;
      font-size: 46px;
      letter-spacing: 4px;
      color: #ffffff;
      /* 흰색 LED가 빛나는 듯한 글로우 */
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.9),
        0 0 18px rgba(255, 255, 255, 0.6),
        0 0 30px rgba(255, 255, 255, 0.4),
        0 2px 4px rgba(0, 0, 0, 0.6);
    }

    .timer.visible {
      opacity: 1;
    }

    /* 0:00 도달 시 깜빡이는 효과 */
    .timer.done {
      animation: timerBlink 0.6s ease-in-out infinite;
    }
    @keyframes timerBlink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    /* 버튼: 좌우 하단 모서리, 가로 정렬 */
    .buttons {
      position: absolute;
      bottom: 24px;
      left: 24px;
      right: 24px;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
    }

    .btn {
      padding: 14px 32px;
      font-size: 17px;
      font-family: 'Georgia', serif;
      background: rgba(255, 245, 230, 0.15);
      color: #fff5e6;
      border: 1.5px solid rgba(255, 245, 230, 0.6);
      border-radius: 30px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
      pointer-events: auto;
    }
    .btn:hover {
      background: rgba(255, 245, 230, 0.3);
      transform: scale(1.05);
    }

    /* 전구 */
    .bulb {
      position: absolute;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff8dc 0%, #ffd98a 40%, #d4a050 100%);
      box-shadow:
        0 0 25px rgba(255, 220, 150, 0.9),
        0 0 50px rgba(255, 200, 120, 0.6),
        0 0 75px rgba(255, 180, 100, 0.4),
        inset 0 -3px 6px rgba(180, 120, 60, 0.4);
      z-index: 5;
      transition: background 1.5s ease, box-shadow 1.5s ease;
    }

    .bulb.top-1 { top: 10px; left: 60px; }
    .bulb.top-2 { top: 10px; left: 50%; transform: translateX(-50%); }
    .bulb.top-3 { top: 10px; right: 60px; }

    .bulb.left-1  { top: 150px; left: 10px; }
    .bulb.left-2  { top: 290px; left: 10px; }
    .bulb.left-3  { top: 430px; left: 10px; }
    .bulb.left-4  { top: 570px; left: 10px; }

    .bulb.right-1 { top: 150px; right: 10px; }
    .bulb.right-2 { top: 290px; right: 10px; }
    .bulb.right-3 { top: 430px; right: 10px; }
    .bulb.knob    { top: 570px; right: 10px; cursor: grab; }
    .bulb.knob:active { cursor: grabbing; }

    .knob::after {
      content: '';
      position: absolute;
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
      width: 5px;
      height: 10px;
      background: rgba(120, 70, 30, 0.7);
      border-radius: 2px;
    }

    /* 전구 색상 단계 */
    .mirror-container.stage-1 .bulb {
      background: radial-gradient(circle at 35% 35%, #fff0d0 0%, #ff9a4a 40%, #cc5a1a 100%);
      box-shadow: 0 0 30px rgba(255, 140, 60, 1), 0 0 60px rgba(255, 120, 40, 0.7), 0 0 90px rgba(255, 100, 20, 0.5);
    }
    .mirror-container.stage-2 .bulb {
      background: radial-gradient(circle at 35% 35%, #fff0f5 0%, #ff9ac8 40%, #cc4a8a 100%);
      box-shadow: 0 0 30px rgba(255, 150, 200, 1), 0 0 60px rgba(255, 130, 180, 0.7), 0 0 90px rgba(255, 110, 160, 0.5);
    }
    .mirror-container.stage-3 .bulb {
      background: radial-gradient(circle at 35% 35%, #f0fcff 0%, #9ad8ff 40%, #4a98cc 100%);
      box-shadow: 0 0 30px rgba(150, 210, 255, 1), 0 0 60px rgba(130, 190, 255, 0.7), 0 0 90px rgba(110, 170, 255, 0.5);
    }
    .mirror-container.stage-4 .bulb {
      background: radial-gradient(circle at 35% 35%, #ffffff 0%, #f5f5f5 40%, #d8d8d8 100%);
      box-shadow: 0 0 35px rgba(255, 255, 255, 1), 0 0 70px rgba(255, 255, 255, 0.85), 0 0 110px rgba(255, 255, 255, 0.65);
    }

    .knob-hint {
      position: absolute;
      bottom: 30px;
      right: 75px;
      color: rgba(255, 245, 230, 0.85);
      font-size: 13px;
      font-style: italic;
      pointer-events: none;
      transition: opacity 0.5s ease;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.7);
      z-index: 21;
    }
    .knob-hint.hidden { opacity: 0; }
  </style>
</head>
<body>

  <!-- 방의 빛/그림자 레이어 -->
  <div class="sun-patch"></div>
  <div class="floor-shadow"></div>

  <!-- 커튼 (거울 뒤, 좌우) -->
  <div class="curtain left">
    <div class="curtain-fabric"></div>
  </div>
  <div class="curtain right">
    <div class="curtain-fabric"></div>
  </div>
  <div class="curtain-rod"></div>

  <!-- 거울 -->
  <div class="mirror-container" id="mirrorContainer">
    <div class="mirror-rotator" id="mirrorRotator">

      <div class="mirror-frame">
        <div class="mirror-screen">
          <video id="video" autoplay playsinline muted></video>
          <div class="camera-message" id="cameraMessage">
            거울을 켜려면 카메라 권한을 허용해주세요
          </div>
          <div class="overlay" id="overlay">
            <div class="question">지금 기분이 어때요?</div>
            <div class="buttons">
              <button class="btn" id="btnGood">괜찮아</button>
              <button class="btn" id="btnBad">별로야</button>
            </div>
          </div>
          <!-- 타이머: 질문이 사라진 뒤 나타남 -->
          <div class="timer" id="timer">20:00</div>
        </div>
      </div>

      <div class="bulb top-1"></div>
      <div class="bulb top-2"></div>
      <div class="bulb top-3"></div>

      <div class="bulb left-1"></div>
      <div class="bulb left-2"></div>
      <div class="bulb left-3"></div>
      <div class="bulb left-4"></div>

      <div class="bulb right-1"></div>
      <div class="bulb right-2"></div>
      <div class="bulb right-3"></div>
      <div class="bulb knob" id="knob"></div>

    </div>

    <div class="knob-hint" id="knobHint">돌려보세요 →</div>
  </div>

  <script>
    // 카메라
    const video = document.getElementById('video');
    const cameraMessage = document.getElementById('cameraMessage');

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user' }, audio: false
        });
        video.srcObject = stream;
        cameraMessage.style.display = 'none';
      } catch (err) {
        cameraMessage.textContent = '카메라를 사용할 수 없어요.\n권한을 확인하거나 다시 시도해주세요.';
        console.error('카메라 에러:', err);
      }
    }
    startCamera();

    // 거울 회전
    const mirrorRotator = document.getElementById('mirrorRotator');
    const overlay = document.getElementById('overlay');
    const btnGood = document.getElementById('btnGood');
    const btnBad = document.getElementById('btnBad');
    const timer = document.getElementById('timer');

    let isFlipping = false;
    let timerStarted = false;  // 타이머가 이미 시작됐는지 (중복 방지)

    function flipMirror(direction) {
      if (isFlipping) return;
      isFlipping = true;

      const className = direction === 'up' ? 'flip-up' : 'flip-down';
      mirrorRotator.classList.add(className);

      setTimeout(() => {
        mirrorRotator.classList.remove(className);
        isFlipping = false;
        // 회전이 끝난 뒤 타이머 등장 + 카운트다운 시작
        startTimer();
      }, 1400);
    }

    btnGood.addEventListener('click', () => { flipMirror('up'); overlay.classList.add('hidden'); });
    btnBad.addEventListener('click',  () => { flipMirror('down'); overlay.classList.add('hidden'); });

    // ============================================================
    // 20분 타이머: 20:00부터 0:00까지 카운트다운
    // 0:00 도달 시 깜빡임 + 알림음
    // ============================================================
    function startTimer() {
      if (timerStarted) return;  // 한 번만 시작
      timerStarted = true;

      let totalSeconds = 20 * 60;  // 20분 = 1200초

      // 초를 MM:SS 형식 문자열로 변환
      function format(sec) {
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        // 분/초 모두 2자리로 (예: 09:05). padStart가 앞자리를 0으로 채움
        return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
      }

      // 첫 화면: 20:00 표시 + 나타나기
      timer.textContent = format(totalSeconds);
      timer.classList.add('visible');

      // 1초마다 1씩 감소
      const interval = setInterval(() => {
        totalSeconds--;
        timer.textContent = format(totalSeconds);

        if (totalSeconds <= 0) {
          clearInterval(interval);       // 카운트다운 정지
          timer.classList.add('done');   // 깜빡임 효과
          playAlarm();                   // 알림음
        }
      }, 1000);
    }

    // 알림음: Web Audio로 만든 부드러운 '띵-띵-띵' 3회
    function playAlarm() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const beepFreq = 880;  // 솔#5 정도의 맑은 음

      // 한 번의 비프음
      function beep(startTime) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = beepFreq;

        gain.gain.setValueAtTime(0, startTime);
        gain.gain.linearRampToValueAtTime(0.3, startTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.5);

        osc.connect(gain).connect(audioCtx.destination);
        osc.start(startTime);
        osc.stop(startTime + 0.5);
      }

      // 0.6초 간격으로 3번
      const now = audioCtx.currentTime;
      beep(now);
      beep(now + 0.6);
      beep(now + 1.2);
    }

    // 노브 + 오르골
    const mirrorContainer = document.getElementById('mirrorContainer');
    const knob = document.getElementById('knob');
    const knobHint = document.getElementById('knobHint');

    let rotation = 0, isDragging = false, lastAngle = 0;
    let totalRotation = 0, currentStage = 0, audioStarted = false;

    function getKnobCenter() {
      const r = knob.getBoundingClientRect();
      return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
    }
    function getAngle(mx, my) {
      const c = getKnobCenter();
      return Math.atan2(my - c.y, mx - c.x) * (180 / Math.PI);
    }
    function handleDragStart(x, y, e) {
      isDragging = true;
      lastAngle = getAngle(x, y);
      e.preventDefault();
    }
    function handleDragMove(x, y) {
      if (!isDragging) return;
      const cur = getAngle(x, y);
      let delta = cur - lastAngle;
      if (delta > 180) delta -= 360;
      if (delta < -180) delta += 360;
      if (delta > 0) {
        rotation += delta;
        totalRotation += delta;
        knob.style.transform = `rotate(${rotation}deg)`;
        const newStage = Math.min(4, Math.floor(totalRotation / 90) + 1);
        if (newStage !== currentStage) setStage(newStage);
      }
      lastAngle = cur;
    }
    function handleDragEnd() { isDragging = false; }

    knob.addEventListener('mousedown', (e) => handleDragStart(e.clientX, e.clientY, e));
    window.addEventListener('mousemove', (e) => handleDragMove(e.clientX, e.clientY));
    window.addEventListener('mouseup', handleDragEnd);

    knob.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      handleDragStart(t.clientX, t.clientY, e);
    });
    window.addEventListener('touchmove', (e) => {
      const t = e.touches[0];
      handleDragMove(t.clientX, t.clientY);
    });
    window.addEventListener('touchend', handleDragEnd);

    function setStage(stage) {
      mirrorContainer.classList.remove('stage-1', 'stage-2', 'stage-3', 'stage-4');
      mirrorContainer.classList.add(`stage-${stage}`);
      currentStage = stage;
      knobHint.classList.add('hidden');
      if (!audioStarted) { startMusicBox(); audioStarted = true; }
    }

    // 오르골 (Web Audio)
    function startMusicBox() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const C5 = 523.25, D5 = 587.33, E5 = 659.25, G5 = 783.99, A5 = 880.00;
      const melody = [
        { freq: C5, dur: 0.5 }, { freq: C5, dur: 0.5 },
        { freq: G5, dur: 0.5 }, { freq: G5, dur: 0.5 },
        { freq: A5, dur: 0.5 }, { freq: A5, dur: 0.5 },
        { freq: G5, dur: 1.0 },
        { freq: E5, dur: 0.5 }, { freq: E5, dur: 0.5 },
        { freq: D5, dur: 0.5 }, { freq: D5, dur: 0.5 },
        { freq: C5, dur: 1.0 },
      ];
      function oscillator(freq, type) {
        const o = audioCtx.createOscillator();
        o.type = type;
        o.frequency.value = freq;
        return o;
      }
      function playNote(freq, startTime, duration) {
        const osc = oscillator(freq, 'sine');
        const osc2 = oscillator(freq * 2, 'triangle');
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0, startTime);
        g.gain.linearRampToValueAtTime(0.25, startTime + 0.01);
        g.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
        const g2 = audioCtx.createGain();
        g2.gain.setValueAtTime(0, startTime);
        g2.gain.linearRampToValueAtTime(0.08, startTime + 0.01);
        g2.gain.exponentialRampToValueAtTime(0.001, startTime + duration * 0.7);
        osc.connect(g).connect(audioCtx.destination);
        osc2.connect(g2).connect(audioCtx.destination);
        osc.start(startTime); osc.stop(startTime + duration);
        osc2.start(startTime); osc2.stop(startTime + duration);
      }
      function playMelody(startTime) {
        let t = startTime;
        for (const note of melody) {
          playNote(note.freq, t, note.dur);
          t += note.dur;
        }
        setTimeout(() => playMelody(audioCtx.currentTime), (t - startTime + 0.5) * 1000);
      }
      playMelody(audioCtx.currentTime);
    }
  </script>
